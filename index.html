<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bode Night 2026 - Marketing Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Bangers&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #ff003c;
            /* Neon Red */
            --secondary: #d4af37;
            /* Gold */
            --accent: #00f2ff;
            /* Cyan */
            --bg-dark: #050505;
            --card-bg: #121212;
            --text: #ffffff;
            --text-dim: #a0a0a0;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --neon-glow: 0 0 15px rgba(255, 0, 60, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            background-image:
                radial-gradient(circle at 10% 20%, rgba(255, 0, 60, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(212, 175, 55, 0.08) 0%, transparent 40%);
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            padding: 10px;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding-bottom: 40px;
        }

        /* Header Section */
        header {
            text-align: center;
            padding: 50px 20px 30px;
            position: relative;
        }

        .logo-area {
            display: inline-block;
            position: relative;
        }

        .logo-area h1 {
            font-family: 'Bangers', cursive;
            font-size: clamp(3.5rem, 10vw, 5rem);
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #ffffff 30%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3));
            line-height: 0.9;
        }

        .logo-area .year {
            font-size: clamp(1.5rem, 5vw, 2.2rem);
            color: var(--primary);
            font-weight: 800;
            display: block;
            margin-top: -5px;
            text-shadow: var(--neon-glow);
            letter-spacing: 5px;
        }

        header p {
            color: var(--text-dim);
            font-size: 0.8rem;
            margin-top: 25px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 400;
        }

        /* Navigation Tabs */
        .nav-container {
            position: sticky;
            top: 10px;
            z-index: 100;
            margin-bottom: 30px;
            padding: 0 5px;
        }

        .nav-tabs {
            display: flex;
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 5px;
            overflow-x: auto;
            scrollbar-width: none;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .nav-tabs::-webkit-scrollbar {
            display: none;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            background: none;
            color: var(--text-dim);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            border-radius: 40px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 0, 60, 0.4);
        }

        /* Content Area */
        .content-section {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 15px;
        }

        .section-header h2 {
            font-size: 1.1rem;
            color: var(--secondary);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .refresh-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Asset Grid */
        .asset-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 0 10px;
        }

        .asset-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
            position: relative;
        }

        .asset-card:hover {
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(255, 0, 60, 0.15);
            transform: translateY(-5px);
        }

        .asset-preview {
            aspect-ratio: 9/16;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .asset-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: zoom-in;
            transition: transform 0.6s ease;
        }

        .asset-card:hover .asset-preview img {
            transform: scale(1.08);
        }

        .asset-info {
            padding: 15px;
        }

        .asset-title {
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 5px;
            display: block;
            color: white;
        }

        .asset-meta {
            font-size: 0.7rem;
            color: var(--text-dim);
            display: block;
            margin-bottom: 15px;
        }

        /* Action Buttons */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, #a30026 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(255, 0, 60, 0.3);
        }

        .btn-secondary-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .btn-wa {
            background: #25D366;
            color: white;
        }

        .btn-copy {
            background: var(--glass);
            color: white;
            border: 1px solid var(--glass-border);
        }

        .btn:active {
            transform: scale(0.97);
        }

        /* Badges */
        .badge {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 5px 10px;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 800;
            z-index: 2;
            text-transform: uppercase;
        }

        .badge-new {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 10px var(--accent);
        }

        .badge-posted {
            background: #25D366;
            color: white;
        }

        /* Overlay for Videos */
        .video-icon {
            position: absolute;
            z-index: 1;
            font-size: 2rem;
            color: white;
            opacity: 0.8;
            pointer-events: none;
            filter: drop-shadow(0 0 10px rgba(0, 0, 0, 0.5));
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-dim);
            font-size: 0.75rem;
            border-top: 1px solid var(--glass-border);
            margin-top: 40px;
        }

        /* Modal Preview */
        #previewModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        #modalImg {
            max-width: 100%;
            max-height: 90vh;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        /* Loading */
        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 20px;
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid var(--glass);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .asset-grid {
                grid-template-columns: 1fr;
            }

            .logo-area h1 {
                font-size: 3.5rem;
            }

            .nav-tabs {
                border-radius: 15px;
            }

            .tab-btn {
                padding: 10px 15px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="logo-area">
                <h1>BODE NIGHT</h1>
                <span class="year">2026</span>
            </div>
            <p>Portal de Marketing & Divulgação</p>
        </header>

        <div class="nav-container">
            <nav class="nav-tabs" id="mainNav">
                <button class="tab-btn active" onclick="switchTab('chamadas')">📣 Chamadas</button>
                <button class="tab-btn" onclick="switchTab('patrocinadores')">🤝 Patrocinadores</button>
                <button class="tab-btn" onclick="switchTab('reels')">📽️ Reels</button>
                <button class="tab-btn" onclick="switchTab('links')">🔗 Links Úteis</button>
            </nav>
        </div>

        <main id="contentArea">
            <div class="loader-container">
                <div class="loader"></div>
                <p style="color: var(--text-dim); font-size: 0.8rem;">Carregando portal...</p>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Bode Night • Marketing Premium</p>
            <p style="margin-top: 5px; opacity: 0.5;">Dica: Use o botão "Postar no Status" para compartilhar direto.</p>
        </footer>
    </div>

    <div id="previewModal" onclick="this.style.display='none'">
        <img id="modalImg" src="">
    </div>

    <script>
        // ==========================================
        // CONFIGURAÇÃO DE AUTOMAÇÃO (GOOGLE DRIVE)
        // ==========================================
        const LINK_DO_MEU_SCRIPT = "https://script.google.com/macros/s/AKfycbx6GIu9Qu9XFq2y5exPDi4yAaT14fmSVb7HGtQ65yazXHjh5jxa7MXG9GhVW36gEr9E/exec";

        let ASSETS_DATA = {};
        let currentTab = '';
        let isSyncing = false;

        async function sincronizarComDrive() {
            if (!LINK_DO_MEU_SCRIPT || LINK_DO_MEU_SCRIPT.includes("COLE_O_LINK")) return;

            isSyncing = true;
            document.getElementById('contentArea').innerHTML = `
                <div class="loader-container">
                    <div class="loader"></div>
                    <p style="color: var(--text-dim); font-size: 0.8rem;">Sincronizando com as pastas do Drive...</p>
                </div>`;

            try {
                const response = await fetch(LINK_DO_MEU_SCRIPT);
                const data = await response.json();

                ASSETS_DATA = data;

                // Pega a primeira pasta como aba inicial se não houver uma selecionada
                const categories = Object.keys(ASSETS_DATA);
                if (categories.length > 0) {
                    if (!currentTab || !ASSETS_DATA[currentTab]) {
                        currentTab = categories[0];
                    }
                    renderTabs(categories);
                } else {
                    document.getElementById('contentArea').innerHTML = `
                        <div style="text-align:center; padding: 50px; color: var(--text-dim);">
                            <p>Nenhuma subpasta encontrada na pasta principal.</p>
                            <small>Crie pastas dentro da pasta "Bode Night - 2026" no Drive.</small>
                        </div>`;
                }

                render();
            } catch (e) {
                console.error("Erro ao sincronizar:", e);
                document.getElementById('contentArea').innerHTML = `
                    <div style="text-align:center; padding: 50px; color: var(--primary);">
                        <p>Erro ao conectar com o Drive.</p>
                        <button class="refresh-btn" style="margin-top:20px" onclick="sincronizarComDrive()">Tentar Novamente</button>
                    </div>`;
            } finally {
                isSyncing = false;
            }
        }

        function renderTabs(categories) {
            const nav = document.getElementById('mainNav');
            nav.innerHTML = '';

            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${currentTab === cat ? 'active' : ''}`;
                btn.innerHTML = `${cat}`;
                btn.onclick = () => switchTab(cat);
                nav.appendChild(btn);
            });

            // Adiciona abas fixas no final se desejar
            const reelBtn = document.createElement('button');
            reelBtn.className = 'tab-btn';
            reelBtn.innerHTML = '📽️ Reels';
            reelBtn.onclick = () => window.open('https://www.instagram.com', '_blank');
            nav.appendChild(reelBtn);
        }

        function switchTab(tabId) {
            currentTab = tabId;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === tabId);
            });
            render();
        }

        function render() {
            const container = document.getElementById('contentArea');
            if (!currentTab || !ASSETS_DATA[currentTab]) return;

            const data = ASSETS_DATA[currentTab] || [];

            let html = `<div class="content-section">
                <div class="section-header">
                    <h2>📁 ${currentTab.toUpperCase()}</h2>
                    <button class="refresh-btn" onclick="sincronizarComDrive()">⟳ Sincronizar</button>
                </div>
                <div class="asset-grid">`;

            if (data.length === 0) {
                html += `<div style="grid-column: 1/-1; text-align: center; padding: 60px; color: var(--text-dim);">
                    <p>Nenhum arquivo nesta pasta do Drive.</p>
                </div>`;
            } else {
                data.forEach(item => {
                    const isPosted = localStorage.getItem('posted_' + item.id);
                    html += `
                    <div class="asset-card">
                        <div class="asset-preview">
                            ${item.isVideo ? '<div class="video-icon">▶</div>' : ''}
                            <img src="${item.url}" alt="${item.title}" onclick="openPreview('${item.url}')" onerror="this.src='https://via.placeholder.com/400x711/1a1a1a/ffffff?text=Erro+no+Link'">
                            ${item.isNew ? '<span class="badge badge-new">Novo</span>' : ''}
                            ${isPosted ? '<span class="badge badge-posted">✅ Postado</span>' : ''}
                        </div>
                        <div class="asset-info">
                            <span class="asset-title">${item.title}</span>
                            <span class="asset-meta">📁 ${item.file} • 📅 ${item.date}</span>
                            <div class="btn-group">
                                <button class="btn btn-primary" onclick="shareAsset('${item.id}', '${item.url}', '${item.title}')">
                                    📤 Postar no Status
                                </button>
                                <div class="btn-secondary-group">
                                    <button class="btn btn-wa" onclick="shareToWA('${item.url}', '${item.title}')">WhatsApp</button>
                                    <button class="btn btn-copy" onclick="copyLink('${item.url}')">Link</button>
                                </div>
                            </div>
                        </div>
                    </div>`;
                });
            }

            html += `</div></div>`;
            container.innerHTML = html;
        }

        function openPreview(url) {
            const modal = document.getElementById('previewModal');
            document.getElementById('modalImg').src = url;
            modal.style.display = 'flex';
        }

        async function shareAsset(id, url, title) {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const file = new File([blob], 'bode_night.jpg', { type: 'image/jpeg' });

                if (navigator.share && navigator.canShare({ files: [file] })) {
                    await navigator.share({
                        files: [file],
                        title: 'Bode Night 2026',
                        text: `Bode Night 2026 🐐🔥`
                    });
                    localStorage.setItem('posted_' + id, 'true');
                    render();
                } else {
                    downloadFallback(url, id);
                }
            } catch (err) {
                downloadFallback(url, id);
            }
        }

        function downloadFallback(url, id) {
            const a = document.createElement('a');
            a.href = url;
            a.download = 'bode_night.jpg';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            alert("Imagem baixada! Abra o WhatsApp e poste no seu Status.");
            localStorage.setItem('posted_' + id, 'true');
            setTimeout(() => { window.location.href = "whatsapp://send"; }, 1000);
            render();
        }

        function shareToWA(url, title) {
            const text = `🔥 *Bode Night 2026* 🔥\n\nConfira esta arte: ${url}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }

        function copyLink(url) {
            navigator.clipboard.writeText(url).then(() => {
                alert("✅ Link copiado!");
            });
        }

        document.addEventListener('DOMContentLoaded', sincronizarComDrive);
    </script>
</body>

</html>
